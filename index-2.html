<script>
const SEASON = "20252026";
const PROXY = "https://corsproxy.io/?url=";

// ── NHL API helpers ──────────────────────────────────────────────
async function nhlfetch(url) {
  try {
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (r.ok) return await r.json();
  } catch(e) {}
  try {
    const r = await fetch(PROXY + encodeURIComponent(url));
    if (r.ok) return await r.json();
  } catch(e) {}
  return null;
}

// ── Claude AI search ─────────────────────────────────────────────
async function askClaude(question, statsContext) {
  const systemPrompt = `You are KnightsMuse, a Vegas Golden Knights stats assistant. Answer questions about VGK players and the team concisely and accurately. Use the live stats provided below when available. Format key numbers in bold using <strong> tags. Keep answers to 2-4 sentences max. Only answer questions about the Golden Knights.

Current 2025-26 season roster stats:
${statsContext}

Franchise records:
- All-time points leader: Jonathan Marchessault (519 pts)
- All-time goals leader: Jonathan Marchessault (197 goals)
- All-time wins leader (G): Marc-Andre Fleury (190 wins)
- Single-season points record: Jack Eichel, 91 pts (2022-23)
- Single-season goals record: Jonathan Marchessault, 41 goals (2022-23)
- Stanley Cup: Won in 2023, defeated Florida Panthers 4-1. Marchessault won Conn Smythe.`;

  const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer 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"
    },
    body: JSON.stringify({
      model: "llama3-70b-8192",
      max_tokens: 300,
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: question }
      ]
    })
  });
  const data = await response.json();
  return data.choices?.[0]?.message?.content || "Sorry, I couldn't get an answer right now.";
}

const ROSTER = [

let playerStats = {};
let statsLoaded = false;

function initials(n) { return n.split(' ').map(w => w[0]).join(''); }

async function fetchPlayerStats(id) {
  try {
    // Try the stats summary endpoint first - faster
    const d = await nhlfetch(`https://api-web.nhle.com/v1/player/${id}/landing`);
    if (!d) return null;
    const season = d.seasonTotals?.find(s => s.season === parseInt(SEASON) && s.gameTypeId === 2);
    if (season) return season;
    // fallback: check featuredStats
    if (d.featuredStats?.regularSeason?.subSeason) return d.featuredStats.regularSeason.subSeason;
    return null;
  } catch(e) { return null; }
}

// Fallback stats (as of Apr 7 2026) in case API fails
const FALLBACK_STATS = {

async function loadAllStats() {
  if (statsLoaded) return;
  const results = await Promise.all(ROSTER.map(p => fetchPlayerStats(p.id)));
  ROSTER.forEach((p, i) => {
    // Use live API result if available, otherwise use fallback
    playerStats[p.id] = results[i] || FALLBACK_STATS[p.id] || null;
  });
  statsLoaded = true;
}

function buildStatsContext() {
  return ROSTER.map(p => {
    const s = playerStats[p.id];
    if (!s) return `${p.name} (${p.pos}): stats unavailable`;
    if (p.pos === 'G') return `${p.name} (G): ${s.gamesPlayed}GP, ${s.wins}W, ${s.savePctg?.toFixed(3)} SV%, ${s.goalsAgainstAvg?.toFixed(2)} GAA, ${s.shutouts}SO`;
    return `${p.name} (${p.pos}): ${s.gamesPlayed}GP, ${s.goals}G, ${s.assists}A, ${s.points}PTS, ${s.plusMinus >= 0 ? '+' : ''}${s.plusMinus}`;
  }).join('\n');
}

// ── Search / AI ──────────────────────────────────────────────────
async function runQuery() {
  const raw = document.getElementById("q-input").value.trim();
  if (!raw) return;
  const area = document.getElementById("answer-area");
  const btn = document.getElementById("ask-btn");
  btn.disabled = true;
  area.innerHTML = `<div class="km-answer-card"><div class="km-answer-label"><span class="km-ai-badge">AI</span> KnightsMuse</div><div class="km-answer-main"><span class="typing-dots">Thinking</span></div></div>`;

  // Answer immediately with known context, fetch stats in parallel
  const statsPromise = loadAllStats();
  // Give stats 3 seconds max, then answer anyway
  await Promise.race([statsPromise, new Promise(r => setTimeout(r, 3000))]);
  const statsContext = buildStatsContext();
  const answer = await askClaude(raw, statsContext);

  area.innerHTML = `<div class="km-answer-card"><div class="km-answer-label"><span class="km-ai-badge">AI</span> KnightsMuse</div><div class="km-answer-main">${answer}</div></div>`;
  btn.disabled = false;
}

function setQ(t) { document.getElementById("q-input").value = t; runQuery(); }

// ── Players ──────────────────────────────────────────────────────
function avatarEl(p, isDetail) {
  if (p.img) return `<img class="${isDetail ? 'km-detail-photo' : 'km-player-photo'}" src="${p.img}" alt="${p.name}" />`;
  return `<div class="${isDetail ? 'km-detail-avatar' : 'km-player-avatar'}">${initials(p.name)}</div>`;
}

function sc(val, lbl) {
  return `<div class="km-detail-stat"><div class="km-detail-stat-val">${val}</div><div class="km-detail-stat-lbl">${lbl}</div></div>`;
}

async function renderPlayers() {
  const grid = document.getElementById("player-grid");
  grid.innerHTML = '<div class="km-loading">Loading live roster stats...</div>';
  await loadAllStats();
  const groups = [
    { label: "Forwards", players: ROSTER.filter(p => p.pos !== 'D' && p.pos !== 'G') },
    { label: "Defense",  players: ROSTER.filter(p => p.pos === 'D') },
    { label: "Goalies",  players: ROSTER.filter(p => p.pos === 'G') },
  ];
  let html = '';
  for (const g of groups) {
    html += `<div class="km-pos-group">${g.label}</div><div class="km-player-grid">`;
    for (const p of g.players) {
      const idx = ROSTER.indexOf(p);
      const s = playerStats[p.id];
      let sr = '';
      if (p.pos === 'G') {
        sr = s
          ? `<div class="km-stat-row"><span class="km-stat-label">W</span><span class="km-stat-val">${s.wins ?? '—'}</span></div>
             <div class="km-stat-row"><span class="km-stat-label">SV%</span><span class="km-stat-val">${s.savePctg ? s.savePctg.toFixed(3) : '—'}</span></div>
             <div class="km-stat-row"><span class="km-stat-label">GAA</span><span class="km-stat-val">${s.goalsAgainstAvg ? s.goalsAgainstAvg.toFixed(2) : '—'}</span></div>`
          : `<div class="km-stat-row"><span class="km-stat-label">Stats</span><span class="km-stat-val">—</span></div>`;
      } else {
        sr = s
          ? `<div class="km-stat-row"><span class="km-stat-label">PTS</span><span class="km-stat-val">${s.points ?? '—'}</span></div>
             <div class="km-stat-row"><span class="km-stat-label">G</span><span class="km-stat-val">${s.goals ?? '—'}</span></div>
             <div class="km-stat-row"><span class="km-stat-label">A</span><span class="km-stat-val">${s.assists ?? '—'}</span></div>`
          : `<div class="km-stat-row"><span class="km-stat-label">PTS</span><span class="km-stat-val">—</span></div>`;
      }
      html += `<div class="km-player-card" id="pc-${idx}" onclick="selectPlayer(${idx})">${avatarEl(p, false)}<div class="km-player-info"><div class="km-player-name">${p.name}</div><div class="km-player-pos">${p.pos}</div>${sr}</div></div>`;
    }
    html += '</div>';
  }
  grid.innerHTML = html;
}

function selectPlayer(i) {
  const p = ROSTER[i];
  const s = playerStats[p.id];
  document.querySelectorAll('.km-player-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('pc-' + i);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  let sh = '';
  if (p.pos === 'G' && s) {
    sh = sc(s.gamesPlayed ?? '—', 'GP') + sc(s.wins ?? '—', 'W') + sc(s.savePctg ? s.savePctg.toFixed(3) : '—', 'SV%') + sc(s.goalsAgainstAvg ? s.goalsAgainstAvg.toFixed(2) : '—', 'GAA') + sc(s.shutouts ?? '—', 'SO');
  } else if (s) {
    sh = sc(s.gamesPlayed ?? '—', 'GP') + sc(s.points ?? '—', 'PTS') + sc(s.goals ?? '—', 'G') + sc(s.assists ?? '—', 'A') + sc(s.plusMinus !== undefined ? (s.plusMinus > 0 ? '+' : '') + s.plusMinus : '—', '+/-') + sc(s.pim ?? '—', 'PIM');
  }
  document.getElementById('player-detail').innerHTML = `<div class="km-detail-card">${avatarEl(p, true)}<div class="km-detail-info"><div class="km-detail-name">${p.name}</div><div class="km-detail-pos">${p.pos} · 2025–26</div><div class="km-detail-stats">${sh || '<div style="color:#444;font-size:13px;">Stats unavailable</div>'}</div></div></div>`;
}

// ── Standings ────────────────────────────────────────────────────
async function fetchStandings() {
  const d = await nhlfetch("https://api-web.nhle.com/v1/standings/now");
  if (!d) throw new Error("no data");
  return d.standings;
}

function buildTable(teams, compact) {
  return `<table class="km-standings-table"><thead><tr>
    <th>#</th><th style="text-align:left;">Team</th><th>GP</th><th>W</th><th>L</th><th>OTL</th><th>PTS</th>${!compact ? '<th>GF</th><th>GA</th><th>DIFF</th>' : ''}
  </tr></thead><tbody>${teams.map((t, i) => {
    const vgk = t.teamAbbrev?.default === "VGK";
    const diff = t.goalFor - t.goalAgainst;
    return `<tr class="${vgk ? 'vgk-row' : ''}"><td>${i + 1}</td><td>${vgk ? '⚔️ ' : ''}${t.teamName?.default ?? t.teamAbbrev?.default}</td><td>${t.gamesPlayed}</td><td>${t.wins}</td><td>${t.losses}</td><td>${t.otLosses}</td><td>${t.points}</td>${!compact ? `<td>${t.goalFor}</td><td>${t.goalAgainst}</td><td>${diff > 0 ? '+' : ''}${diff}</td>` : ''}</tr>`;
  }).join('')}</tbody></table>`;
}

async function loadHomeStandings() {
  const el = document.getElementById("home-standings");
  try {
    const s = await fetchStandings();
    const pac = s.filter(t => t.divisionName === "Pacific").sort((a, b) => a.divisionSequence - b.divisionSequence);
    el.innerHTML = buildTable(pac, true);
  } catch(e) { el.innerHTML = '<div class="km-loading">Could not load standings.</div>'; }
}

let fullStandingsLoaded = false;
async function loadFullStandings() {
  const el = document.getElementById("standings-full");
  try {
    const standings = await fetchStandings();
    let html = "";
    for (const conf of ["Western", "Eastern"]) {
      html += `<div style="margin-bottom:28px;"><div style="font-size:14px;font-weight:700;color:#f0ede6;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;">${conf} Conference</div>`;
      const divs = [...new Set(standings.filter(t => t.conferenceName === conf).map(t => t.divisionName))];
      for (const div of divs) {
        const teams = standings.filter(t => t.divisionName === div).sort((a, b) => a.divisionSequence - b.divisionSequence);
        html += `<div class="km-card" style="margin-bottom:14px;"><div class="km-div-label">${div} Division</div>${buildTable(teams, false)}</div>`;
      }
      html += '</div>';
    }
    el.innerHTML = html;
    fullStandingsLoaded = true;
  } catch(e) { el.innerHTML = '<div class="km-loading">Could not load standings.</div>'; }
}

let currentRecTab = "franchise";
function recTab(key) {
  currentRecTab = key;
  document.querySelectorAll(".km-tab").forEach((t, i) => { t.classList.toggle("active", ["franchise", "season", "playoff"][i] === key); });
  renderRecords();
}
function renderRecords() {
  document.getElementById("records-list").innerHTML = `<div class="km-milestone-list">${milestones[currentRecTab].map(m => `<div class="km-milestone"><div class="km-milestone-icon">${m.icon}</div><div class="km-milestone-text"><div class="km-milestone-title">${m.title}</div><div class="km-milestone-desc">${m.desc}</div></div><div class="km-milestone-year">${m.year}</div></div>`).join('')}</div>`;
}

// ── Nav ──────────────────────────────────────────────────────────
function goHome() {
  document.getElementById("q-input").value = "";
  document.getElementById("answer-area").innerHTML = "";
  showTab('search');
}

let twitterLoaded = false;
function loadTwitter() {
  if (twitterLoaded) return;
  twitterLoaded = true;
  const s = document.createElement("script");
  s.src = "https://platform.twitter.com/widgets.js";
  s.async = true;
  document.body.appendChild(s);
}

function showTab(name) {
  ["search", "players", "records", "standings", "feed"].forEach(t => {
    document.getElementById("tab-" + t).style.display = t === name ? "" : "none";
  });
  document.querySelectorAll(".km-nav button").forEach((b, i) => {
    b.classList.toggle("active", ["search", "players", "records", "standings", "feed"][i] === name);
  });
  if (name === "search") { loadHomeStandings(); loadTwitter(); }
  if (name === "players") renderPlayers();
  if (name === "records") renderRecords();
  if (name === "standings" && !fullStandingsLoaded) loadFullStandings();
  if (name === "feed") loadTwitter();
}
